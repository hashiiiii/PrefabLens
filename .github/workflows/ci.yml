name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install tools
        uses: jdx/mise-action@v4
      - name: Test
        run: zig build test

  perf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install tools
        uses: jdx/mise-action@v4
      - name: Performance budget
        run: zig build perf

  extension:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extension
    steps:
      - uses: actions/checkout@v7
      - name: Install tools
        uses: jdx/mise-action@v4
      - name: Build WASM core
        run: zig build wasm
        working-directory: ${{ github.workspace }}
      - name: WASM golden (Node)
        run: node --test core/tests/*.test.mjs
        working-directory: ${{ github.workspace }}
      - name: Install deps
        run: npm ci
      - name: WASM size budget
        run: npm run size
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests
        run: npm test
      - name: Build extension
        run: npm run build
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: E2E smoke
        run: npm run e2e

  mcp:
    # npm パッケージは全 OS 向けに配布し、プロセス kill・タイムアウト・spawn はプラットフォーム差が出やすいので windows でも回す。
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: mcp
    steps:
      - uses: actions/checkout@v7
      - name: Install tools
        uses: jdx/mise-action@v4
      - name: Build CLI
        run: zig build
        working-directory: ${{ github.workspace }}
      - name: Install deps
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        run: npm run build
      - name: Tests
        run: npm test
