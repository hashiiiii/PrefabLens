name: Release
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (X.Y.Z, no v prefix)'
        required: true

permissions:
  contents: write

# Prevent overlapping runs of release.yml
concurrency:
  group: release

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ inputs.version }}
    steps:
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          client-id: ${{ secrets.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
      - uses: actions/checkout@v7
        with:
          token: ${{ steps.app-token.outputs.token }}
      - name: Install tools
        uses: jdx/mise-action@v4
      - name: Validate input
        run: |
          set -euo pipefail
          [ "$GITHUB_REF_NAME" = "main" ] || { echo "::error::run this workflow from main (got $GITHUB_REF_NAME)"; exit 1; }
      - name: Bump, commit, and tag
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
        run: |
          set -euo pipefail
          # Author the commit as the app; the +<id> email links it to the bot account.
          user_id=$(gh api "/users/${APP_SLUG}[bot]" --jq .id)
          git config user.name "${APP_SLUG}[bot]"
          git config user.email "${user_id}+${APP_SLUG}[bot]@users.noreply.github.com"
          bump-my-version bump --new-version "$VERSION"
          pnpm -C extension version "$VERSION" --no-git-tag-version --allow-same-version --no-git-checks
          git add -u
          git diff --cached --quiet || git commit -m "chore: release v$VERSION"
          git tag "v$VERSION"
          git push --atomic origin main "v$VERSION"
      - name: Build CLI for all targets
        run: |
          set -euo pipefail
          mkdir -p dist
          build() {
            zig build -Dtarget="$1" -Doptimize=ReleaseSafe
            (cd zig-out/bin && zip -j "../../dist/prefablens-$2.zip" "$3")
          }
          build aarch64-macos    macos-arm64  prefablens
          build x86_64-macos     macos-x64    prefablens
          build x86_64-linux-gnu linux-x64    prefablens
          build x86_64-windows   windows-x64  prefablens.exe
      - name: Create release
        env:
          # Publish as the App so the release isn't attributed to github-actions[bot].
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: gh release create "v$VERSION" dist/*.zip --generate-notes
