name: CI
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  core:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - name: Version sync guard
        if: matrix.os == 'ubuntu-latest'
        run: .github/scripts/check-version-sync.sh
      - name: Install tools
        uses: jdx/mise-action@v4
      - name: Restore Zig global cache
        # Windows Zig caching was measured as not worth it (see PR #36 context)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/cache@v4
        with:
          path: ~/.cache/zig
          key: ${{ runner.os }}-zig-${{ hashFiles('build.zig.zon') }}
          restore-keys: |
            ${{ runner.os }}-zig-
      - name: Lint
        run: zig build lint
      - name: Test
        run: zig build test
      - name: Performance budget
        # Windows runners are too noisy; the measurements swing too much, so skip them here
        if: matrix.os == 'ubuntu-latest'
        run: zig build perf

  extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install tools
        uses: jdx/mise-action@v4
      - name: Restore Zig global cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/zig
          key: ${{ runner.os }}-zig-${{ hashFiles('build.zig.zon') }}
          restore-keys: |
            ${{ runner.os }}-zig-
      - name: Resolve pnpm store directory
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"
      - name: Restore pnpm store cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('extension/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-
      - name: Resolve Playwright version
        id: playwright-version
        run: |
          version=$(grep -oE '@playwright/test@[0-9]+\.[0-9]+\.[0-9]+' extension/pnpm-lock.yaml | head -n 1 | cut -d '@' -f 3)
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - name: Restore Playwright browser cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}
      - name: WASM build and golden
        run: |
          zig build wasm
          node --test core/tests/*.test.mjs
      - name: Extension checks
        working-directory: extension
        run: |
          pnpm install --frozen-lockfile
          pnpm run size
          pnpm run lint
          pnpm run typecheck
          pnpm test
          pnpm run build
      - name: Extension E2E
        working-directory: extension
        run: |
          pnpm exec playwright install --with-deps chromium
          pnpm run e2e

  editor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install tools
        uses: jdx/mise-action@v4
      - name: Restore NuGet package cache
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('editor/**/*.csproj', 'editor/.config/dotnet-tools.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-
      - name: Lint
        working-directory: editor
        run: |
          dotnet tool restore
          dotnet csharpier check . --no-msbuild-check
      - name: Test
        working-directory: editor
        run: dotnet test DotNetTests~/Tests

  packaging:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Render test
        run: cli/pkg/render_test.sh

  site:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Build site inputs
        uses: ./.github/actions/build-site
      - name: Site checks
        working-directory: site
        run: |
          node --test src/*.test.mjs
          node build.mjs
