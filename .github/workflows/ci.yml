name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  core:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - name: Install tools
        uses: jdx/mise-action@v4
      - name: Test
        run: zig build test
      - name: Performance budget
        # Windows ランナーはノイズが大きいので計測結果がブレ過ぎるため対象外とする
        if: matrix.os == 'ubuntu-latest'
        run: zig build perf

  extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install tools
        uses: jdx/mise-action@v4
      - name: WASM build and golden
        run: |
          zig build wasm
          node --test core/tests/*.test.mjs
      - name: Extension checks
        working-directory: extension
        run: |
          npm ci
          npm run size
          npm run typecheck
          npm test
          npm run build
      - name: Extension E2E
        working-directory: extension
        run: |
          npx playwright install --with-deps chromium
          npm run e2e
