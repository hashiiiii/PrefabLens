name: CI
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  core:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - name: Install tools
        uses: jdx/mise-action@v4
      - name: Lint
        run: zig build lint
      - name: Test
        run: zig build test
      - name: Performance budget
        # Windows runners are too noisy; the measurements swing too much, so skip them here
        if: matrix.os == 'ubuntu-latest'
        run: zig build perf

  extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install tools
        uses: jdx/mise-action@v4
      - name: WASM build and golden
        run: |
          zig build wasm
          node --test core/tests/*.test.mjs
      - name: Extension checks
        working-directory: extension
        run: |
          pnpm install --frozen-lockfile
          pnpm run size
          pnpm run lint
          pnpm run typecheck
          pnpm test
          pnpm run build
      - name: Extension E2E
        working-directory: extension
        run: |
          pnpm exec playwright install --with-deps chromium
          pnpm run e2e

  editor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install tools
        uses: jdx/mise-action@v4
      - name: Lint
        working-directory: editor
        run: |
          dotnet tool restore
          dotnet csharpier check . --no-msbuild-check

  packaging:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Render test
        run: packaging/render_test.sh
