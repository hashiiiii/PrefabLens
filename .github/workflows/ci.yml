name: CI
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# One run per ref at a time; a superseded push cancels the in-flight run
# instead of queueing a redundant full matrix behind it.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - name: Version sync guard
        if: matrix.os == 'ubuntu-latest'
        run: .github/scripts/check-version-sync.sh
      - name: Packaging render test
        # Plain bash + coreutils; folded here so it does not need its own runner
        if: matrix.os == 'ubuntu-latest'
        run: cli/pkg/render_test.sh
      - name: Install tools
        uses: jdx/mise-action@v4
      - name: Restore Zig global cache
        # Windows Zig caching was measured as not worth it (see PR #36 context)
        if: matrix.os == 'ubuntu-latest'
        uses: ./.github/actions/setup-zig-cache
      - name: Lint
        run: zig build lint
      - name: Test
        run: zig build test
      - name: Performance budget
        # Windows runners are too noisy; the measurements swing too much, so skip them here
        if: matrix.os == 'ubuntu-latest'
        run: zig build perf

  extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install tools
        uses: jdx/mise-action@v4
      - name: Restore Zig global cache
        uses: ./.github/actions/setup-zig-cache
      - name: Restore pnpm store cache
        uses: ./.github/actions/setup-pnpm-store
      - name: Resolve Playwright version
        id: playwright-version
        run: |
          version=$(grep -oE '@playwright/test@[0-9]+\.[0-9]+\.[0-9]+' extension/pnpm-lock.yaml | head -n 1 | cut -d '@' -f 3)
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - name: Restore Playwright browser cache
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}
      - name: WASM build and golden
        run: |
          zig build wasm
          node --test core/tests/*.test.mjs
      - name: Extension checks
        working-directory: extension
        run: |
          pnpm install --frozen-lockfile
          pnpm run size
          pnpm run lint
          pnpm run typecheck
          pnpm test
          pnpm run build
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: extension
        run: pnpm exec playwright install --with-deps chromium
      - name: Install Playwright OS dependencies
        # A cache hit restores the browser binaries but not the runner's OS
        # packages; the E2E launches full Chromium (channel "chromium" with
        # the extension loaded), so the shared libraries must still exist.
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        working-directory: extension
        run: pnpm exec playwright install-deps chromium
      - name: Extension E2E
        working-directory: extension
        run: pnpm run e2e

  editor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install tools
        uses: jdx/mise-action@v4
      - name: Restore NuGet package cache
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('editor/**/*.csproj', 'editor/.config/dotnet-tools.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-
      - name: Lint
        working-directory: editor
        run: |
          dotnet tool restore
          dotnet csharpier check . --no-msbuild-check
      - name: Test
        working-directory: editor
        run: dotnet test DotNetTests~/Tests

  site:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Build site inputs
        uses: ./.github/actions/build-site
      - name: Site checks
        working-directory: site
        run: |
          pnpm install --frozen-lockfile
          pnpm run build
