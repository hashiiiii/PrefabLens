name: Release
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (X.Y.Z, no v prefix)'
        required: true

permissions:
  contents: write

# Prevent overlapping runs of release.yml
concurrency:
  group: release

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ inputs.version }}
      GIT_AUTHOR_NAME: github-actions[bot]
      GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
      GIT_COMMITTER_NAME: github-actions[bot]
      GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
    steps:
      - uses: actions/checkout@v7
      - name: Install tools
        uses: jdx/mise-action@v4
      - name: Validate input
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          [ "$GITHUB_REF_NAME" = "main" ] || { echo "::error::run this workflow from main (got $GITHUB_REF_NAME)"; exit 1; }
          if gh api "repos/$GITHUB_REPOSITORY/git/ref/tags/v$VERSION" >/dev/null 2>&1; then
            echo "::error::tag v$VERSION already exists; delete it first to re-release: git push origin :refs/tags/v$VERSION"
            exit 1
          fi
      - name: Bump, commit, and tag
        run: |
          set -euo pipefail
          bump-my-version bump --new-version "$VERSION"
          npm --prefix extension version "$VERSION" --no-git-tag-version --allow-same-version
          git add -u
          git diff --cached --quiet || git commit -m "chore: release v$VERSION"
          git tag "v$VERSION"
          git push origin main "v$VERSION"
      - name: Build CLI for all targets
        run: |
          set -euo pipefail
          mkdir -p dist
          build() {
            zig build -Dtarget="$1" -Doptimize=ReleaseSafe
            (cd zig-out/bin && zip -j "../../dist/prefablens-$2.zip" "$3")
          }
          build aarch64-macos    macos-arm64  prefablens
          build x86_64-macos     macos-x64    prefablens
          build x86_64-linux-gnu linux-x64    prefablens
          build x86_64-windows   windows-x64  prefablens.exe
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "v$VERSION" dist/*.zip --generate-notes
