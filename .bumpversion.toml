[tool.bumpversion]
current_version = "0.7.0"
parse = "(?P<major>\\d+)\\.(?P<minor>\\d+)\\.(?P<patch>\\d+)"
serialize = ["{major}.{minor}.{patch}"]
search = "{current_version}"
replace = "{new_version}"
commit = false
tag = false
allow_dirty = true

[[tool.bumpversion.files]]
filename = "build.zig.zon"
search = '.version = "{current_version}"'
replace = '.version = "{new_version}"'

[[tool.bumpversion.files]]
filename = "extension/manifest.json"
search = '"version": "{current_version}"'
replace = '"version": "{new_version}"'

[[tool.bumpversion.files]]
filename = "editor/package.json"
search = '"version": "{current_version}"'
replace = '"version": "{new_version}"'

[[tool.bumpversion.files]]
filename = "editor/Editor/Cli.cs"
search = 'public const string Version = "{current_version}"'
replace = 'public const string Version = "{new_version}"'
