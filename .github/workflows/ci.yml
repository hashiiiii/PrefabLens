name: CI
on:
  push:
    branches: [main]
  pull_request:

# PR への force-push で旧ランを打ち切る。main は履歴として全ランを残す。
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  linux:
    # perf の計測自体は 1 秒未満で、旧 perf ジョブの所要時間はほぼ ReleaseFast の
    # コンパイルとランナーのセットアップだった。独立ジョブにする意味がないので同居させる。
    runs-on: ubuntu-latest
    env:
      ZIG_GLOBAL_CACHE_DIR: ${{ github.workspace }}/.zig-cache-global
    steps:
      - uses: actions/checkout@v7
      - name: Install tools
        uses: jdx/mise-action@v4
        with:
          install_args: zig
      - name: Cache Zig artifacts
        uses: actions/cache@v4
        with:
          path: |
            .zig-cache
            .zig-cache-global
          key: zig-${{ github.job }}-${{ hashFiles('mise.toml') }}-${{ github.sha }}
          restore-keys: zig-${{ github.job }}-${{ hashFiles('mise.toml') }}-
      - name: Test
        run: zig build test
      - name: Performance budget
        run: zig build perf

  extension:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extension
    env:
      ZIG_GLOBAL_CACHE_DIR: ${{ github.workspace }}/.zig-cache-global
    steps:
      - uses: actions/checkout@v7
      - name: Install tools
        uses: jdx/mise-action@v4
        with:
          install_args: zig node
      - name: Cache Zig artifacts
        uses: actions/cache@v4
        with:
          path: |
            .zig-cache
            .zig-cache-global
          key: zig-${{ github.job }}-${{ hashFiles('mise.toml') }}-${{ github.sha }}
          restore-keys: zig-${{ github.job }}-${{ hashFiles('mise.toml') }}-
      - name: Build WASM core
        run: zig build wasm
        working-directory: ${{ github.workspace }}
      - name: WASM golden (Node)
        run: node --test core/tests/*.test.mjs
        working-directory: ${{ github.workspace }}
      - name: Install deps
        run: npm ci
      - name: WASM size budget
        run: npm run size
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests
        run: npm test
      - name: Build extension
        run: npm run build
      - name: Cache Playwright browser
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('extension/package-lock.json') }}
      - name: Install Playwright browser
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
      - name: E2E smoke
        run: npm run e2e
