name: Pages
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7
      - name: Install tools
        uses: jdx/mise-action@v4
      - name: Build CLI and WASM
        run: |
          zig build
          zig build wasm
      - name: Build site
        working-directory: site
        run: |
          pnpm install --frozen-lockfile
          node build.mjs
      - uses: actions/upload-pages-artifact@v5
        with:
          path: site/dist
      - id: deployment
        uses: actions/deploy-pages@v5
